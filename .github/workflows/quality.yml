name: Quality

on:
  pull_request:
  push:
    branches: [dev, main]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: codetice
          POSTGRES_PASSWORD: codetice
          POSTGRES_DB: codetice_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U codetice -d codetice_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://codetice:codetice@localhost:5432/codetice_guard
      TEST_DATABASE_URL: postgres://codetice:codetice@localhost:5432/codetice_test
      RUN_DATABASE_INTEGRATION: "true"
      RUN_DOCKER_INTEGRATION: "true"
      DOCKER_TEST_IMAGE: alpine:3.20
      SESSION_SECRET: ci-session-secret-at-least-32-characters
      APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: docker pull "$DOCKER_TEST_IMAGE"
      - run: bun test
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run build

# =============================================================
# codetice - Docker Compose stack
#
# Services:
#   db       - PostgreSQL 17 database
#   web      - Next.js web application
#   worker   - Grading-job background worker
#
# Usage:
#   1. Copy .env.example to .env.local and fill in secrets.
#   2. docker compose --env-file .env.local up -d
# =============================================================

services:
  # -------------------------------------------
  # PostgreSQL database
  # -------------------------------------------
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-codetice}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-codetice}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # -------------------------------------------
  # Next.js web application
  # -------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      APP_URL: ${APP_URL:?APP_URL is required}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-}
      NODE_ENV:       production
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - external

  # -------------------------------------------
  # Grading-job worker
  #   Polls the DB for pending submissions and
  #   executes them inside Docker containers.
  #   Requires the host Docker socket so it can
  #   spawn sibling containers (DinD pattern).
  # -------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      GRADING_RUNTIME:           docker
      GRADING_WORKER_POLL_MS:    ${GRADING_WORKER_POLL_MS:-2000}
      GRADING_WORKER_BATCH_SIZE: ${GRADING_WORKER_BATCH_SIZE:-5}
    # Add the host docker group so the non-root worker user can
    # access /var/run/docker.sock. Set DOCKER_GID in .env to match
    # your host: stat -c '%g' /var/run/docker.sock
    group_add:
      - "${DOCKER_GID:-999}"
    volumes:
      # Bind-mount the host Docker socket so the worker can run
      # sandboxed code-execution containers as siblings.
      - /var/run/docker.sock:/var/run/docker.sock
      # Shared /tmp so the worker can mount workspace dirs into
      # sibling containers (paths must resolve on the HOST).
      - /tmp:/tmp
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

volumes:
  db_data:

networks:
  internal:
  external:
